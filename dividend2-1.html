<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>필요 배당 계산기 | STEP 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0a0c10; color: #ffffff; margin: 0; height: 100vh; display: flex; }
        .text-gold-gradient { background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold-gradient { background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); }
        .gold-icon-gradient { background: linear-gradient(135deg, #c4a46a 0%, #e8d5b5 50%, #c4a46a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(232, 213, 181, 0.4)); display: inline-block; }
        .step-label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; display: block; font-weight: 600; }
        .step-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 0.5rem; padding: 0.75rem 1rem; width: 100%; text-align: right; font-size: 1.25rem; font-weight: 800; transition: all 0.3s ease; appearance: none; -moz-appearance: textfield; }
        .step-input:focus { outline: none; border-color: #c4a46a; box-shadow: 0 0 10px rgba(196, 164, 106, 0.2); }
        /* placeholder 음영 스타일 */
        .step-input::placeholder { color: rgba(255, 255, 255, 0.2); }
        .guide-box { background: linear-gradient(145deg, rgba(30, 35, 45, 0.4), rgba(15, 18, 25, 0.6)); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; padding: 9rem 5rem; max-width: 1200px; width: 92%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); height: 592px; overflow: hidden; position: relative; }
    </style>
    <script src="consultation-io.js" defer></script>
</head>
<body>
    <aside class="w-[400px] border-r border-white/10 flex flex-col p-10 bg-[#11141a] relative shrink-0">
        <button onclick="location.href='dividend.html'" class="absolute top-8 right-8 px-5 py-2.5 bg-white/5 border border-white/10 rounded-full text-gray-100 hover:bg-white/10 hover:text-white hover:border-white/30 transition-all flex items-center gap-2 text-base font-bold z-10 shadow-[0_4px_10px_rgba(0,0,0,0.3)]">
            <i class="fas fa-home gold-icon-gradient"></i> 메인으로
        </button>
        
        <div class="space-y-8 flex-grow mt-14">
            <section>
                <p class="text-[11px] text-gold-gradient font-bold tracking-widest mb-2 uppercase">STEP 01</p>
                <h3 class="text-2xl font-bold mb-10">연배당 수령 목표</h3>
                <div class="space-y-6">
                    <div>
                        <label class="step-label">매달 얼마씩 받고 싶으신가요? (원)</label>
                        <input type="text" inputmode="numeric" id="input-monthly" class="step-input" placeholder="0"
                               onfocus="if(this.value === '0') this.value='';"
                               onblur="if(this.value === '') this.value='';"
                               oninput="formatNumberInput(this)" autofocus>
                    </div>
                </div>
            </section>
        </div>
        <div class="mt-auto pt-10">
            <button onclick="saveAndNext()" class="w-full py-4 bg-gold-gradient text-black font-extrabold rounded-lg hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(232,213,181,0.2)]">
                다음 단계 <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col items-center justify-center p-12 bg-[#0a0c10]">
        <div class="guide-box text-center">
            <div class="w-24 h-24 bg-[#161b22] rounded-full flex items-center justify-center mb-8 mx-auto shadow-[0_0_30px_rgba(0,0,0,0.8)] border border-white/5">
                <i class="fas fa-coins gold-icon-gradient text-4xl"></i>
            </div>
            <h2 class="text-4xl font-extrabold mb-6 tracking-tight">필요 은퇴 배당 계산기</h2>
            <p class="text-gray-400 text-lg text-center leading-relaxed font-light">은퇴 후 매달 받고 싶은 연금 소득을 입력하세요.<br>목표 달성을 위해 준비해야 할 일시금을 역산해 드립니다.</p>
        </div>
    </main>

    <script>
        function formatNumberInput(element) {
            let numString = element.value.replace(/[^0-9]/g, '');
            if (numString.length > 1 && numString.charAt(0) === '0') numString = numString.replace(/^0+/, '');
            if (numString === '') { element.value = ''; return; }
            element.value = numString.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 핵심: 페이지 로드 시 기존에 저장된 "2,000,000" 데이터를 강제로 삭제합니다.
            localStorage.removeItem('calc_monthly');
            localStorage.removeItem('pension_monthly');
            
            // 입력창을 무조건 빈 값으로 초기화하여 placeholder '0'이 보이게 합니다.
            document.getElementById('input-monthly').value = '';
        });

        function saveAndNext() {
            const val = document.getElementById('input-monthly').value.replace(/[^0-9]/g, '');
            if(!val || val === '0') return alert('목표 수령액을 입력해 주세요.');
            
            // 사용자가 새로 입력한 값만 저장합니다.
            localStorage.setItem('calc_monthly', val);
            location.href = 'dividend2-2.html';
        }
    </script>
</body>
</html>
