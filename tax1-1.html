<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>적립식 세금 시뮬레이션 | STEP 01</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0a0c10; color: #ffffff; margin: 0; height: 100vh; display: flex; }
        .text-gold-gradient { background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold-gradient { background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); }
        .gold-icon-gradient { background: linear-gradient(135deg, #c4a46a 0%, #e8d5b5 50%, #c4a46a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(232, 213, 181, 0.4)); display: inline-block; }
        .step-label { color: #94a3b8; font-size: 0.8rem; margin-bottom: 0.35rem; display: block; font-weight: 600; }
        .step-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 0.5rem; padding: 0.55rem 0.85rem; width: 100%; text-align: right; font-size: 1.1rem; font-weight: 800; transition: all 0.3s ease; appearance: none; -moz-appearance: textfield; }
        .step-input:focus { outline: none; border-color: #c4a46a; box-shadow: 0 0 10px rgba(196, 164, 106, 0.2); }
        .step-input::placeholder { color: rgba(255, 255, 255, 0.2); }

        /* 날짜 분할 입력 그룹 */
        .date-group {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem; padding: 0.55rem 0.85rem; width: 100%; transition: all 0.3s ease;
        }
        .date-group:focus-within { border-color: #c4a46a; box-shadow: 0 0 10px rgba(196, 164, 106, 0.2); }
        .date-inputs { display: flex; align-items: center; justify-content: flex-end; flex-grow: 1; margin-right: 0.75rem; }
        .date-inputs input { background: transparent; border: none; color: white; text-align: center; font-size: 1.1rem; font-weight: 800; outline: none; padding: 0; }
        .date-inputs span { color: #94a3b8; margin: 0 0.25rem; }
        .calendar-wrapper { position: relative; display: flex; align-items: center; justify-content: center; color: #c4a46a; cursor: pointer; font-size: 1.1rem; transition: color 0.3s ease, transform 0.2s ease; }
        .calendar-wrapper:hover { color: #e8d5b5; transform: scale(1.1); }
        .hidden-date-picker { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .guide-box { background: linear-gradient(145deg, rgba(30, 35, 45, 0.4), rgba(15, 18, 25, 0.6)); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; padding: 9rem 5rem; max-width: 1200px; width: 92%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); height: 592px; overflow: hidden; position: relative; }
        .luxury-card { background: linear-gradient(145deg, rgba(30, 35, 45, 0.35), rgba(15, 18, 25, 0.6)); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #c4a46a; }

        /* 페이지네이션 화살표 */
        .page-arrow {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #94a3b8;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .page-arrow:hover:not(.disabled) {
            background: rgba(196, 164, 106, 0.15);
            border-color: rgba(196, 164, 106, 0.4);
            color: #c4a46a;
        }
        .page-arrow.disabled {
            opacity: 0.25;
            cursor: default;
            pointer-events: none;
        }
    </style>
    <script src="consultation-io.js" defer></script>
</head>
<body>
    <aside class="w-[400px] border-r border-white/10 flex flex-col px-10 py-6 bg-[#11141a] relative shrink-0">
        <button onclick="location.href='tax.html'" class="absolute top-8 right-8 px-5 py-2.5 bg-white/5 border border-white/10 rounded-full text-gray-100 hover:bg-white/10 hover:text-white hover:border-white/30 transition-all flex items-center gap-2 text-base font-bold z-10 shadow-[0_4px_10px_rgba(0,0,0,0.3)]">
            <i class="fas fa-home gold-icon-gradient"></i> 메인으로
        </button>

        <div class="space-y-4 flex-grow mt-12">
            <section>
                <p class="text-[11px] text-gold-gradient font-bold tracking-widest mb-1 uppercase">STEP 01</p>
                <h3 class="text-2xl font-bold mb-5">적립식 투자 정보</h3>
                <div class="space-y-4">
                    <div>
                        <label class="step-label">월 납입금 (원)</label>
                        <input type="text" inputmode="numeric" id="input-monthly" class="step-input" placeholder="0"
                               onfocus="if(this.value === '0') this.value='';"
                               onblur="if(this.value === '') this.value='';"
                               oninput="formatNumberInput(this)" autofocus>
                    </div>
                    <div>
                        <label class="step-label">투자 기간 (년)</label>
                        <input type="text" inputmode="numeric" id="input-years" class="step-input" placeholder="10"
                               oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                    <div>
                        <label class="step-label">예상 연수익률 (%)</label>
                        <input type="text" inputmode="decimal" id="input-rate" class="step-input" placeholder="5"
                               oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
                    </div>
                    <div>
                        <label class="step-label">적금 이자율 (%)</label>
                        <input type="text" inputmode="decimal" id="input-saving-rate" class="step-input" placeholder="3.5"
                               oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
                    </div>
                    <div id="birth-field">
                        <label class="step-label">생년월일</label>
                        <div class="date-group">
                            <div class="date-inputs">
                                <input type="text" inputmode="numeric" id="birth-year" maxlength="4" style="width: 3.5rem;" placeholder="1985">
                                <span>.</span>
                                <input type="text" inputmode="numeric" id="birth-month" maxlength="2" style="width: 1.8rem;" placeholder="01">
                                <span>.</span>
                                <input type="text" inputmode="numeric" id="birth-day" maxlength="2" style="width: 1.8rem;" placeholder="01">
                            </div>
                            <div class="calendar-wrapper">
                                <input type="date" class="hidden-date-picker" data-target="birth">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                        </div>
                    </div>
                    <div id="age-field" style="display:none;">
                        <label class="step-label">현재 나이 (만)</label>
                        <input type="text" id="input-age" class="step-input" readonly style="text-align:center; opacity:0.7; cursor:default;">
                    </div>
                    <div>
                        <label class="step-label">연금 수령 예상 시기 (만 나이)</label>
                        <input type="text" inputmode="numeric" id="input-pension-age" class="step-input" placeholder="55"
                               oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                </div>
            </section>
        </div>
        <div class="mt-auto pt-4">
            <button id="calc-btn" onclick="calculateTax()" class="w-full py-4 bg-gold-gradient text-black font-extrabold rounded-lg hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(232,213,181,0.2)]">
                세금 계산하기 <i class="fas fa-calculator"></i>
            </button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col items-center justify-center p-12 bg-[#0a0c10] overflow-hidden">
        <div id="result-area" class="flex flex-col" style="background: linear-gradient(145deg, rgba(30, 35, 45, 0.4), rgba(15, 18, 25, 0.6)); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; padding: 1.2rem 2.5rem; max-width: 1200px; width: 92%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); height: 592px; overflow: hidden; position: relative;">
            <div id="page-content" class="flex-grow flex flex-col justify-center" style="min-height:0;"></div>
            <!-- 페이지네이션 -->
            <div id="pagination-bar" class="flex items-center justify-center gap-6 shrink-0 py-2" style="display:none;">
                <button id="prev-page" class="page-arrow disabled" onclick="prevPage()">
                    <i class="fas fa-caret-left text-xl"></i>
                </button>
                <button id="next-page" class="page-arrow disabled" onclick="nextPage()">
                    <i class="fas fa-caret-right text-xl"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        function formatNumberInput(element) {
            let numString = element.value.replace(/[^0-9]/g, '');
            if (numString.length > 1 && numString.charAt(0) === '0') numString = numString.replace(/^0+/, '');
            if (numString === '') { element.value = ''; return; }
            element.value = numString.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        const fmt = (n) => Math.round(n).toLocaleString();
        const formatLargeKRW = (num) => {
            let n = Math.floor(num);
            if (n === 0) return '0원';
            const uk = Math.floor(n / 100000000);
            const man = Math.floor((n % 100000000) / 10000);
            let res = '';
            if (uk > 0) res += uk.toLocaleString() + '억 ';
            if (man > 0) res += man.toLocaleString() + '만 ';
            return (res.trim() || '0') + '원';
        };

        // 페이지네이션 상태
        let pages = [];
        let currentPage = 0;

        function renderPage() {
            const container = document.getElementById('page-content');
            if (!container || !pages.length) return;
            container.innerHTML = pages[currentPage];

            const paginationBar = document.getElementById('pagination-bar');
            if (paginationBar) paginationBar.style.display = pages.length > 1 ? 'flex' : 'none';

            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');
            if (prevBtn) prevBtn.className = 'page-arrow' + (currentPage === 0 ? ' disabled' : '');
            if (nextBtn) nextBtn.className = 'page-arrow' + (currentPage >= pages.length - 1 ? ' disabled' : '');
        }

        function prevPage() {
            if (currentPage > 0) { currentPage--; renderPage(); }
        }
        function nextPage() {
            if (currentPage < pages.length - 1) { currentPage++; renderPage(); }
        }

        function calculateTax() {
            const monthlyVal = document.getElementById('input-monthly').value;
            const yearsVal = document.getElementById('input-years').value;
            const rateVal = document.getElementById('input-rate').value;

            const monthly = parseInt((monthlyVal || '0').replace(/[^0-9]/g, ''));
            const years = parseInt((yearsVal || '0').replace(/[^0-9]/g, ''));
            const rate = parseFloat((rateVal || '0').replace(/[^0-9.]/g, ''));

            const savingRateVal = document.getElementById('input-saving-rate').value;
            const savingRate = parseFloat((savingRateVal || '0').replace(/[^0-9.]/g, ''));

            if (!monthly || !years || !rate) return alert('모든 항목을 입력해 주세요.');

            const totalInvested = monthly * 12 * years;
            const annualRate = rate / 100;
            const monthlyRate = annualRate / 12;
            const totalMonths = years * 12;
            const futureValue = monthly * ((Math.pow(1 + monthlyRate, totalMonths) - 1) / monthlyRate);
            const totalProfit = futureValue - totalInvested;

            // 적금 계산 (단리: 월 적립식)
            const savingAnnual = savingRate / 100;
            const savingMonthlyRate = savingAnnual / 12;
            const savingFV = monthly * totalMonths + monthly * savingMonthlyRate * totalMonths * (totalMonths + 1) / 2;
            const savingProfit = savingFV - totalInvested;

            const taxRate1554 = 0.154;
            const taxISA = 0.099;
            const isaNonTaxable = 2000000;

            const tax1554 = savingProfit * taxRate1554;
            const isaProfit = Math.max(totalProfit - isaNonTaxable, 0);
            const taxISAAmount = isaProfit * taxISA;
            const taxPension = totalProfit * 0.038;
            const taxVariable = years >= 10 ? 0 : totalProfit * taxRate1554;

            // 페이지 구성
            currentPage = 0;
            pages = [];

            // 첫 페이지: 5개 상품 2열 그리드
            pages.push(`
                <h2 class="text-2xl font-extrabold mb-2 text-center text-gold-gradient">세금 비교 분석 결과</h2>
                <div class="grid grid-cols-2 grid-rows-3 gap-1.5 flex-grow" style="min-height:0;">
                    <div class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 flex flex-col justify-center">
                        <p class="font-bold text-[15px]">🏦 일반 과세 - 적금 (15.4%)</p>
                        <p class="text-gray-400 text-xs mt-0.5">이자소득세 14% + 지방소득세 1.4% (적금 이자율 ${savingRate}%)</p>
                        <p class="text-red-400 font-extrabold text-lg mt-0.5">-${fmt(tax1554)}원</p>
                        <p class="text-gray-300 text-base font-semibold">실수령: ${fmt(savingFV - tax1554)}원</p>
                        <div class="flex gap-1 mt-1">
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">종합소득세 합산 (2천만원 초과 시)</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">건보료 부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 flex flex-col justify-center">
                        <p class="font-bold text-[15px]">📊 ISA (9.9%)</p>
                        <p class="text-gray-400 text-xs mt-0.5">200만원 비과세 + 초과분 9.9% 분리과세</p>
                        <p class="text-yellow-400 font-extrabold text-lg mt-0.5">-${fmt(taxISAAmount)}원</p>
                        <p class="text-gray-300 text-base font-semibold">실수령: ${fmt(futureValue - taxISAAmount)}원</p>
                        <div class="flex gap-1 mt-1">
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">종합소득세 비합산</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">건보료 비부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 flex flex-col justify-center">
                        <p class="font-bold text-[15px]">🏛️ 연금저축 / IRP</p>
                        <p class="text-gray-400 text-xs mt-0.5">수령 시 연금소득세 3.3~5.5% (세액공제 혜택)</p>
                        <p class="text-green-400 font-extrabold text-lg mt-0.5">-${fmt(taxPension)}원</p>
                        <p class="text-gray-300 text-base font-semibold">실수령: ${fmt(futureValue - taxPension)}원</p>
                        <div class="flex gap-1 mt-1">
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-yellow-500/15 text-yellow-400 border border-yellow-500/20">종합소득세 합산 (1,500만원 초과 시)</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-yellow-500/15 text-yellow-400 border border-yellow-500/20">건보료 부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 flex flex-col justify-center">
                        <p class="font-bold text-[15px]">🌍 해외주식 직접투자</p>
                        <p class="text-gray-400 text-xs mt-0.5">매매차익 양도소득세 22% (250만원 기본공제)</p>
                        <p class="text-blue-400 font-extrabold text-lg mt-0.5">-${fmt(Math.max(totalProfit - 2500000, 0) * 0.22)}원</p>
                        <p class="text-gray-300 text-base font-semibold">실수령: ${fmt(futureValue - Math.max(totalProfit - 2500000, 0) * 0.22)}원</p>
                        <div class="flex gap-1 mt-1">
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">종합소득세 비합산 (분리과세)</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">건보료 비부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-lg px-3 py-2 flex flex-col justify-center">
                        <p class="font-bold text-[15px]">🛡️ 변액연금보험</p>
                        <p class="text-gray-400 text-xs mt-0.5">${years >= 10 ? '10년 이상 유지 시 비과세' : '10년 미만 유지 시 이자소득세 15.4%'}</p>
                        <p class="${years >= 10 ? 'text-green-300' : 'text-red-400'} font-extrabold text-lg mt-0.5">${taxVariable === 0 ? '0원 (비과세)' : '-' + fmt(taxVariable) + '원'}</p>
                        <p class="text-gray-300 text-base font-semibold">실수령: ${fmt(futureValue - taxVariable)}원</p>
                        <div class="flex gap-1 mt-1">
                            ${years >= 10
                                ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">종합소득세 비합산</span>
                                   <span class="text-[10px] px-1.5 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">건보료 비부과</span>`
                                : `<span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">종합소득세 합산 (2천만원 초과 시)</span>
                                   <span class="text-[10px] px-1.5 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">건보료 부과</span>`
                            }
                        </div>
                    </div>
                    <div></div>
                </div>
            `);

            renderPage();

            const btn = document.getElementById('calc-btn');
            btn.innerHTML = '<i class="fas fa-redo-alt"></i> 다시 계산하기';

            // 생년월일 → 나이 표시 전환
            const birthY = parseInt(document.getElementById('birth-year').value);
            if (birthY) {
                const today = new Date();
                const birthM = parseInt(document.getElementById('birth-month').value) || 1;
                const birthD = parseInt(document.getElementById('birth-day').value) || 1;
                let age = today.getFullYear() - birthY;
                if (today.getMonth() + 1 < birthM || (today.getMonth() + 1 === birthM && today.getDate() < birthD)) age--;
                document.getElementById('input-age').value = age + '세';
                document.getElementById('birth-field').style.display = 'none';
                document.getElementById('age-field').style.display = 'block';
            }
        }

        // 초기 화면: 과세 기준 정보 (금액 없이) 2개씩 페이지
        document.addEventListener('DOMContentLoaded', () => {
            pages = [];
            // 첫 페이지: 5개 상품 2열 그리드 (금액 없이)
            pages.push(`
                <h2 class="text-3xl font-extrabold mb-3 text-center text-gold-gradient">상품별 과세 기준</h2>
                <div class="grid grid-cols-2 grid-rows-3 gap-2 flex-grow">
                    <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-center">
                        <p class="font-bold text-lg">🏦 일반 과세 (15.4%)</p>
                        <p class="text-gray-400 text-sm mt-0.5">이자·배당소득세 14% + 지방소득세 1.4%</p>
                        <div class="flex gap-1.5 mt-1.5">
                            <span class="text-xs px-2 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">종합소득세 합산 (2천만원 초과 시)</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">건보료 부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-center">
                        <p class="font-bold text-lg">📊 ISA (9.9%)</p>
                        <p class="text-gray-400 text-sm mt-0.5">200만원 비과세 + 초과분 9.9% 분리과세</p>
                        <div class="flex gap-1.5 mt-1.5">
                            <span class="text-xs px-2 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">종합소득세 비합산</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">건보료 비부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-center">
                        <p class="font-bold text-lg">🏛️ 연금저축 / IRP</p>
                        <p class="text-gray-400 text-sm mt-0.5">수령 시 연금소득세 3.3~5.5% (세액공제 혜택)</p>
                        <div class="flex gap-1.5 mt-1.5">
                            <span class="text-xs px-2 py-0.5 rounded bg-yellow-500/15 text-yellow-400 border border-yellow-500/20">종합소득세 합산 (1,500만원 초과 시)</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-yellow-500/15 text-yellow-400 border border-yellow-500/20">건보료 부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-center">
                        <p class="font-bold text-lg">🌍 해외주식 직접투자</p>
                        <p class="text-gray-400 text-sm mt-0.5">매매차익 양도소득세 22% (250만원 기본공제)</p>
                        <div class="flex gap-1.5 mt-1.5">
                            <span class="text-xs px-2 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">종합소득세 비합산 (분리과세)</span>
                            <span class="text-xs px-2 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">건보료 비부과</span>
                        </div>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-center">
                        <p class="font-bold text-lg">🛡️ 변액연금보험</p>
                        <p class="text-gray-400 text-sm mt-0.5">10년 이상 유지 시 비과세 / 10년 미만 시 이자소득세 15.4%</p>
                        <div class="flex flex-col gap-1 mt-1.5">
                            <div class="flex gap-1.5">
                                <span class="text-xs px-2 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">비과세: 종소세 비합산</span>
                                <span class="text-xs px-2 py-0.5 rounded bg-green-500/15 text-green-400 border border-green-500/20">건보료 비부과</span>
                            </div>
                            <div class="flex gap-1.5">
                                <span class="text-xs px-2 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">과세: 종소세 합산</span>
                                <span class="text-xs px-2 py-0.5 rounded bg-red-500/15 text-red-400 border border-red-500/20">건보료 부과</span>

                    <div></div>
                </div>
            `);
            currentPage = 0;
            renderPage();

            // 날짜 입력 로직
            const setupDateGroup = (yearId, monthId, dayId) => {
                const inputs = [
                    { el: document.getElementById(yearId), max: 4 },
                    { el: document.getElementById(monthId), max: 2 },
                    { el: document.getElementById(dayId), max: 2 }
                ];
                inputs.forEach((inputObj, index) => {
                    const currentEl = inputObj.el;
                    if (!currentEl) return;
                    currentEl.addEventListener('click', function() { this.select(); });
                    currentEl.addEventListener('focus', function() { this.select(); });
                    currentEl.addEventListener('input', function() {
                        this.value = this.value.replace(/[^0-9]/g, '');
                        if (this.value.length >= inputObj.max && index < inputs.length - 1) {
                            inputs[index + 1].el.focus();
                        }
                    });
                });
            };
            setupDateGroup('birth-year', 'birth-month', 'birth-day');

            // Date Picker 동기화
            document.querySelectorAll('.hidden-date-picker').forEach(picker => {
                picker.addEventListener('change', function() {
                    if (!this.value) return;
                    const targetPrefix = this.getAttribute('data-target');
                    const [y, m, d] = this.value.split('-');
                    document.getElementById(`${targetPrefix}-year`).value = y;
                    document.getElementById(`${targetPrefix}-month`).value = m;
                    document.getElementById(`${targetPrefix}-day`).value = d;
                });
            });
        });
    </script>
