<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STEP 01 | 기본정보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background: #0a0c10; 
            color: #ffffff; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
        }
        
        /* 골드 그라데이션 텍스트 및 배경 */
        .text-gold-gradient { 
            background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .bg-gold-gradient { 
            background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); 
        }
        
        .gold-icon-gradient { 
            background: linear-gradient(135deg, #c4a46a 0%, #e8d5b5 50%, #c4a46a 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 10px rgba(232, 213, 181, 0.4)); 
            display: inline-block; 
        }

        .step-label { 
            color: #94a3b8; 
            font-size: 0.85rem; 
            margin-bottom: 0.5rem; 
            display: block; 
            font-weight: 600; 
        }

        .step-input { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            border-radius: 0.5rem; 
            padding: 0.75rem 1rem; 
            width: 100%; 
            text-align: right; 
            font-size: 1.1rem; 
            transition: all 0.3s ease; 
        }
        .step-input:focus { 
            outline: none; 
            border-color: #c4a46a; 
            box-shadow: 0 0 10px rgba(196, 164, 106, 0.2); 
        }

        /* 날짜 분할 입력 그룹 */
        .date-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        .date-group:focus-within {
            border-color: #c4a46a;
            box-shadow: 0 0 10px rgba(196, 164, 106, 0.2);
        }
        .date-inputs {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-grow: 1;
            margin-right: 0.75rem;
        }
        .date-inputs input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            padding: 0;
        }
        .date-inputs span {
            color: #94a3b8;
            margin: 0 0.25rem;
        }
        .calendar-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c4a46a;
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s ease, transform 0.2s ease;
        }
        .calendar-wrapper:hover {
            color: #e8d5b5;
            transform: scale(1.1);
        }
        .hidden-date-picker {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* 성별 버튼 */
        .gender-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .gender-btn:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }
        .gender-btn.active-male {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: #60a5fa;
        }
        .gender-btn.active-female {
            background: rgba(244, 114, 182, 0.15);
            border-color: #f472b6;
            color: #f472b6;
        }
        .guide-box {
            background: linear-gradient(145deg, rgba(30, 35, 45, 0.4), rgba(15, 18, 25, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            padding: 9rem 5rem;
            max-width: 1200px;
            width: 92%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); height: 592px; overflow: hidden; position: relative;
        }
    </style>
    <script src="consultation-io.js" defer></script>
</head>
<body>
    <aside class="w-[400px] border-r border-white/10 flex flex-col p-10 bg-[#11141a] relative">
        <button onclick="location.href='dividend.html'" class="absolute top-8 right-8 px-5 py-2.5 bg-white/5 border border-white/10 rounded-full text-gray-100 hover:bg-white/10 hover:text-white hover:border-white/30 transition-all flex items-center gap-2 text-base font-bold z-10 shadow-[0_4px_10px_rgba(0,0,0,0.3)]">
            <i class="fas fa-home gold-icon-gradient"></i> 메인으로
        </button>
        
        <div class="space-y-8 flex-grow mt-14">
            <section>
                <p class="text-[11px] text-gold-gradient font-bold tracking-widest mb-2 uppercase">STEP 01</p>
                <h3 class="text-2xl font-bold mb-10">기본정보 및 은퇴시기</h3>
                
                <div class="space-y-6">
                    <div>
                        <label class="step-label">고객 성함</label>
                        <input type="text" id="client-name" class="step-input" placeholder="홍길동" maxlength="20">
                    </div>

                    <div>
                        <label class="step-label">성별</label>
                        <div class="flex gap-3">
                            <button type="button" id="gender-male" class="gender-btn" onclick="selectGender('male')">
                                <i class="fas fa-mars"></i> 남
                            </button>
                            <button type="button" id="gender-female" class="gender-btn" onclick="selectGender('female')">
                                <i class="fas fa-venus"></i> 여
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="step-label">고객 생년월일</label>
                        <div class="date-group">
                            <div class="date-inputs">
                                <input type="text" inputmode="numeric" id="birth-year" maxlength="4" style="width: 3.5rem;" value="1985">
                                <span>.</span>
                                <input type="text" inputmode="numeric" id="birth-month" maxlength="2" style="width: 1.8rem;" value="01">
                                <span>.</span>
                                <input type="text" inputmode="numeric" id="birth-day" maxlength="2" style="width: 1.8rem;" value="01">
                            </div>
                            <div class="calendar-wrapper">
                                <input type="date" class="hidden-date-picker" data-target="birth">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="step-label">상담 및 투자 시작일</label>
                        <div class="date-group">
                            <div class="date-inputs">
                                <input type="text" inputmode="numeric" id="start-year" maxlength="4" style="width: 3.5rem;">
                                <span>.</span>
                                <input type="text" inputmode="numeric" id="start-month" maxlength="2" style="width: 1.8rem;">
                                <span>.</span>
                                <input type="text" inputmode="numeric" id="start-day" maxlength="2" style="width: 1.8rem;">
                            </div>
                            <div class="calendar-wrapper">
                                <input type="date" class="hidden-date-picker" data-target="start">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="step-label">목표 은퇴 나이 (세)</label>
                        <input type="text" inputmode="numeric" id="retire-age" class="step-input" maxlength="3" value="65">
                    </div>
                </div>
            </section>
        </div>

        <div class="mt-auto pt-10">
            <button onclick="saveAndNext()" class="w-full py-4 bg-gold-gradient text-black font-extrabold rounded-lg hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(232,213,181,0.2)]">
                다음 단계 <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col items-center justify-center p-12 bg-[#0a0c10]">
        <div class="guide-box text-center">
            <div class="w-24 h-24 bg-[#161b22] rounded-full flex items-center justify-center mb-8 mx-auto shadow-[0_0_30px_rgba(0,0,0,0.8)] border border-white/5">
                <i class="fas fa-chart-column gold-icon-gradient text-4xl"></i>
            </div>
            <h2 class="text-4xl font-extrabold mb-6 tracking-tight">자산 관리 리포트</h2>
            <p class="text-gray-400 text-lg text-center leading-relaxed font-light">정보를 입력하고 리포트 생성을 클릭하세요.<br>은퇴 시점의 결과를 즉시 분석합니다.</p>
        </div>
    </main>

    <script>
        let selectedGender = '';

        function selectGender(gender) {
            selectedGender = gender;
            const maleBtn = document.getElementById('gender-male');
            const femaleBtn = document.getElementById('gender-female');
            maleBtn.className = 'gender-btn' + (gender === 'male' ? ' active-male' : '');
            femaleBtn.className = 'gender-btn' + (gender === 'female' ? ' active-female' : '');
        }

        function saveAndNext() {
            const birthYear = document.getElementById('birth-year').value;
            const retireAge = document.getElementById('retire-age').value;
            const clientName = document.getElementById('client-name').value.trim();

            const currentYear = new Date().getFullYear();
            const currentAge = currentYear - parseInt(birthYear) + 1;

            localStorage.setItem('currentAge', currentAge);
            localStorage.setItem('retireAge', retireAge);
            localStorage.setItem('clientName', clientName);
            localStorage.setItem('clientGender', selectedGender);

            location.href = 'dividend1-2.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 오늘 날짜 세팅
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            
            document.getElementById('start-year').value = year;
            document.getElementById('start-month').value = month;
            document.getElementById('start-day').value = day;

            // 메인에서 입력한 고객 정보가 있으면 자동 채우기
            const savedName = localStorage.getItem('clientName');
            const savedGender = localStorage.getItem('clientGender');
            const savedBirthYear = localStorage.getItem('birthYear');
            const savedBirthMonth = localStorage.getItem('birthMonth');
            const savedBirthDay = localStorage.getItem('birthDay');

            if (savedName) document.getElementById('client-name').value = savedName;
            if (savedGender) selectGender(savedGender);
            if (savedBirthYear) document.getElementById('birth-year').value = savedBirthYear;
            if (savedBirthMonth) document.getElementById('birth-month').value = savedBirthMonth;
            if (savedBirthDay) document.getElementById('birth-day').value = savedBirthDay;

            // 날짜 입력 로직
            const setupDateGroup = (yearId, monthId, dayId) => {
                const inputs = [
                    { el: document.getElementById(yearId), max: 4 },
                    { el: document.getElementById(monthId), max: 2 },
                    { el: document.getElementById(dayId), max: 2 }
                ];

                inputs.forEach((inputObj, index) => {
                    const currentEl = inputObj.el;
                    if (!currentEl) return;

                    currentEl.addEventListener('click', function() { this.select(); });
                    currentEl.addEventListener('focus', function() { this.select(); });

                    currentEl.addEventListener('input', function() {
                        this.value = this.value.replace(/[^0-9]/g, ''); 
                        if (this.value.length >= inputObj.max && index < inputs.length - 1) {
                            inputs[index + 1].el.focus();
                        }
                    });
                });
            };

            setupDateGroup('birth-year', 'birth-month', 'birth-day');
            setupDateGroup('start-year', 'start-month', 'start-day');

            // Date Picker 동기화
            document.querySelectorAll('.hidden-date-picker').forEach(picker => {
                picker.addEventListener('change', function() {
                    if (!this.value) return;
                    const targetPrefix = this.getAttribute('data-target');
                    const [y, m, d] = this.value.split('-');
                    document.getElementById(`${targetPrefix}-year`).value = y;
                    document.getElementById(`${targetPrefix}-month`).value = m;
                    document.getElementById(`${targetPrefix}-day`).value = d;
                });
            });

            // 은퇴 나이 입력 편의성
            const retireInput = document.getElementById('retire-age');
            if(retireInput) {
                retireInput.addEventListener('click', function() { this.select(); });
                retireInput.addEventListener('focus', function() { this.select(); });
                retireInput.addEventListener('input', function() { 
                    this.value = this.value.replace(/[^0-9]/g, ''); 
                });
            }
        });
    </script>
</body>
</html>
