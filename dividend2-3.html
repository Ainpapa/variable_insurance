<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>필요배당 계산기 | STEP 03</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #0a0c10; color: #ffffff; margin: 0; height: 100vh; display: flex; }
        
        .text-gold-gradient { background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold-gradient { background: linear-gradient(to right, #c4a46a, #e8d5b5, #c4a46a); }
        .gold-icon-gradient { background: linear-gradient(135deg, #c4a46a 0%, #e8d5b5 50%, #c4a46a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(232, 213, 181, 0.4)); display: inline-block; }
        
        .step-label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; display: block; font-weight: 600; }
        .step-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 0.5rem; padding: 0.75rem 1rem; width: 100%; text-align: right; font-size: 1.25rem; font-weight: 800; transition: all 0.3s ease; appearance: none; -moz-appearance: textfield; }
        .step-input:focus { outline: none; border-color: #c4a46a; box-shadow: 0 0 10px rgba(196, 164, 106, 0.2); }
        
        .quick-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #94a3b8; border-radius: 0.4rem; padding: 0.5rem 0; text-align: center; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .quick-btn:hover { background: rgba(196, 164, 106, 0.15); color: #e8d5b5; border-color: rgba(196, 164, 106, 0.3); }

        /* 💡 수정 포인트: 가로는 늘리고 높이는 컴팩트하게 조절 */
        .guide-box { 
            background: linear-gradient(145deg, rgba(30, 35, 45, 0.4), rgba(15, 18, 25, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2rem; 
            padding: 7rem 5rem;
            max-width: 1200px; /* 가로폭을 대폭 확장 */
            width: 92%; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); height: 592px; overflow: hidden; position: relative;
        }
    </style>
    <script src="consultation-io.js" defer></script>
</head>
<body>
    <aside class="w-[400px] border-r border-white/10 flex flex-col p-10 bg-[#11141a] relative shrink-0">
        <button onclick="location.href='dividend.html'" class="absolute top-8 right-8 px-5 py-2.5 bg-white/5 border border-white/10 rounded-full text-gray-100 hover:bg-white/10 hover:text-white hover:border-white/30 transition-all flex items-center gap-2 text-base font-bold z-10 shadow-[0_4px_10px_rgba(0,0,0,0.3)]">
            <i class="fas fa-home gold-icon-gradient"></i> 메인으로
        </button>

        <div class="space-y-8 flex-grow mt-14">
            <section>
                <p class="text-[11px] text-gold-gradient font-bold tracking-widest mb-2 uppercase">STEP 03</p>
                <h3 class="text-2xl font-bold mb-10">배당 수익률 설정</h3>
                <div class="space-y-6">
                    <div>
                        <label class="step-label">은퇴 후 예상 연 배당률 (%)</label>
                        <input type="number" id="calc-rate" class="step-input" value="6.00" step="0.1">
                        <div class="grid grid-cols-4 gap-2 mt-2">
                            <button class="quick-btn" onclick="addRate(0.1)">+0.1%</button>
                            <button class="quick-btn" onclick="addRate(0.5)">+0.5%</button>
                            <button class="quick-btn" onclick="addRate(1.0)">+1.0%</button>
                            <button class="quick-btn" onclick="addRate(2.0)">+2.0%</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <div class="mt-auto pt-10 flex gap-4">
            <button onclick="location.href='dividend2-2.html'" class="px-6 py-4 bg-white/10 text-gray-300 font-bold rounded-lg hover:bg-white/20 hover:text-white transition-all">이전</button>
            <button onclick="saveAndGenerate()" class="flex-grow py-4 bg-[#00b284] text-white font-extrabold rounded-lg hover:bg-[#00d99d] transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,178,132,0.3)]">
                ✨ 리포트 생성
            </button>
        </div>
    </aside>

    <main class="flex-grow flex flex-col items-center justify-center p-12 bg-[#0a0c10]">
        <div class="guide-box text-center">
            <div class="w-14 h-14 bg-[#161b22] rounded-full flex items-center justify-center mb-5 mx-auto border border-white/5">
                <i class="fas fa-landmark gold-icon-gradient text-xl"></i>
            </div>

            <h2 class="text-4xl font-extrabold mb-5 tracking-tight">자산 운용의 정석: <span class="text-gold-gradient">6%의 법칙</span></h2>

            <div class="space-y-3 text-gray-300 text-lg leading-relaxed text-left">
                <p>
                    재단을 영구적으로 유지하는 <strong class="text-white">노벨재단의 ‘4% 룰’</strong>은 원금을 보존하며 지속 가능한 현금흐름을 만드는 자산 운용의 표준입니다.
                </p>
                <p>
                    하지만 가속화되는 <strong class="text-blue-400 font-semibold">물가 상승</strong>과 고배당 ETF의 등장으로 최근 투자 트렌드는 <strong class="text-emerald-400 font-bold text-xl">연 6%</strong> 수준의 수익률을 상향 목표로 설정하는 추세입니다.
                </p>
                <p class="text-base text-gray-400 pt-4 border-t border-white/5">
                    인플레이션을 방어하고 실질적인 삶의 질을 유지하기 위한
                    <span class="text-white font-bold">최적의 목표 배당률</span>을 입력하고 결과를 확인하세요.
                </p>
            </div>
        </div>
    </main>

    <script>
        const inputRate = document.getElementById('calc-rate');
        document.addEventListener('DOMContentLoaded', () => {
            localStorage.removeItem('calc_life_age');
            localStorage.removeItem('calc_return_rate');
            inputRate.value = '6.00';
        });

        function addRate(val) {
            let current = parseFloat(inputRate.value) || 6.00;
            inputRate.value = (current + val).toFixed(2);
        }

        function saveAndGenerate() {
            const finalRate = inputRate.value || "6.00";
            localStorage.setItem('calc_life_age', "100");
            localStorage.setItem('calc_return_rate', finalRate);
            location.href = 'dividend2-result.html';
        }
    </script>
</body>
</html>
